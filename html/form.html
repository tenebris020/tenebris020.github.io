<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <script>
        function check_form()
        {
            console.log("Здравствуй! "+document.forms[0].elements.name.value);
            console.log("проверьте телефон: "+document.forms[0].elements.email.value);
            console.log("проверьте почту: "+document.forms[0].elements.tel.value);
            console.log("ответ вы получите: ");
            for(i=0; i<document.forms[0].elements.com_tion.length;i++)
            {
                if (document.forms[0].elements.com_tion[i].checked)
                    console.log(document.forms[0].elements.com_tion[i].value);


            }
            console.log("тема вопроса: ");
            index = document.forms[0].elements.theme.selectedIndex;
            console.log(document.forms[0].elements.theme[index].text);
            console.log("Или "+document.forms[0].elements.theme[index].value);
            console.log("ответ на вопрос ");
            for(i=0; i<document.forms[0].elements.chb[i].length;i++)     
            {
                if (document.forms[0].elements.chb[i].checked)
                    console.log(document.forms[0].elements.chb[i].value);


            }
        }
        
    </script>
    <title>2015</title>
</head>

<body>
    <header>
        <h2>
            Web-Technologies
        </h2>
        <img src="/html/img/logo.png" alt="логотип" width="50" height="50">        <nav>
            <ul>
                <li><a href="form.html">Регистрационная форма</a></li>
                <li><a href="index.html">Главная</a></li>
                <li><a href="summary.html">Резюме</a></li>
                <li><a href="competencion.html">Компетенции</a></li>
                <li><a href="Photo.html">Фотографии</a></li>
            </ul>
    </header>

    <main class="for-main-form">

        <div class="for-form">

                <form class="form" method="get" name = "myform">
                    <div class="form-flex">
                        <div class="flex">
                            <div>Как вам удобно получить ответ:</div>
                            <label for="c_mail">
                                <input type="radio" name="com_tion" id="c_mail" value="по почте"> по почте
                            </label>
                            <label for="c_tel">
                                <input type="radio" name="com_tion" id="c_tel" value="по телефону"> по телефону
                            </label>
                            <label for="c_none">
                                <input type="radio" name="com_tion" id="c_none" value="никак"> не нужно отвечать
                            </label>
                        </div>

                        <div class="flex">
                            <label for="theme">Укажите тему вопроса</label>
                            <select class="input-style" name="theme" id="theme">
                                <option value="work">работа</option>
                                <option value="cooperation">сотрудничество</option>
                                <option value="personal">личное</option>
                            </select>
                        </div>

                        <div class="flex">
                            <div>И еще один вопрос?</div>
                            <label for="chb1">
                                <input type="checkbox" name="chb" id="chb1" value = "может так"> может так
                            </label>
                            <label for="chb2">
                                <input type="checkbox" name="chb" id="chb2" value = "или не так"> или не так
                            </label>
                            <label for="chb3">
                                <input type="checkbox" name="chb" id="chb3" value = "иначе"> иначе
                            </label>
                        </div>

                            <div class="flex-between-center">
                                <label for="name">Ваше имя</label>
                                <input class="input-style" type="text" name="name" id="name">
                            </div>
                            <div class="flex-between-center">
                                <label for="email">Адрес почты</label>
                                <input class="input-style" type="text" name="email" id="email">
                            </div>
                            <div class="flex-between-center">
                                <label for="tel">Номер телефона</label>
                                <input class="input-style" type="text" name="tel" id="tel">
                            </div>
                        <div>
                            <div>Ваш вопрос:</div>
                            <textarea cols="30" style="resize: none;"></textarea>
                        </div>

                    </div>
                    <input class="input-style flex-button" type="submit" value="Отправить вопрос">
                </form>
                <button onclick="check_form()">проверка формы</button>
        </div>
    </main>

            </div>
        </div>
    </footer>

</body>
